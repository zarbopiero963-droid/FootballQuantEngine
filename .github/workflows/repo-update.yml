name: Repo Update Engine ULTRA

on:
  push:
    branches:
      - main
    paths:
      - devops_update.txt
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: repo-update-main
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest

    env:
      PYTHONPATH: ${{ github.workspace }}

    steps:

      # -------------------------
      # CHECKOUT
      # -------------------------
      - name: Checkout repository with PAT
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
          token: ${{ secrets.REPO_PUSH_TOKEN }}

      # -------------------------
      # PYTHON
      # -------------------------
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # -------------------------
      # INSTALL DEPENDENCIES
      # -------------------------
      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      # -------------------------
      # SHOW TRIGGER COMMIT
      # -------------------------
      - name: Show trigger commit
        run: |
          echo "=============================="
          echo "TRIGGER COMMIT"
          echo "=============================="
          git log -1

      # -------------------------
      # SHOW DEVOPS COMMANDS
      # -------------------------
      - name: Show DevOps instructions
        run: |
          echo "=============================="
          echo "DEVOPS UPDATE COMMANDS"
          echo "=============================="
          cat devops_update.txt
          echo "=============================="

      # -------------------------
      # RUN ENGINE
      # -------------------------
      - name: Run DevOps Engine
        id: engine
        continue-on-error: true
        run: |
          python repo_update_engine.py

      # -------------------------
      # SHOW CHANGED FILES
      # -------------------------
      - name: Show changed files
        run: |
          echo "=============================="
          echo "FILES CHANGED"
          echo "=============================="
          git status
          git diff --stat || true

      # -------------------------
      # CONFIGURE REMOTE
      # -------------------------
      - name: Configure git remote with PAT
        run: |
          git remote set-url origin https://x-access-token:${{ secrets.REPO_PUSH_TOKEN }}@github.com/${{ github.repository }}.git

      # -------------------------
      # COMMIT CHANGES
      # -------------------------
      - name: Commit changes
        shell: bash
        run: |
          set -e

          git config user.name "repo-bot"
          git config user.email "bot@github.com"

          git add .

          if [[ -z "$(git status --porcelain)" ]]; then
            echo "No changes"
            exit 0
          fi

          if [[ "${{ steps.engine.outcome }}" == "failure" ]]; then
            git commit -m "[skip ci] DevOps Engine Rollback"
          else
            git commit -m "[skip ci] Automated DevOps Engine Update"
          fi

          git fetch origin main
          git rebase origin/main
          git push --force-with-lease origin HEAD:main

      # -------------------------
      # FAIL IF ENGINE FAILED
      # -------------------------
      - name: Fail job if engine failed
        if: steps.engine.outcome == 'failure'
        run: |
          echo "Engine failed. Rollback committed."
          exit 1
