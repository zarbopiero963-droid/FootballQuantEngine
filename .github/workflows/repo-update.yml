name: Repo Update Engine

on:
  push:
    paths:
      - devops_update.txt

jobs:

  update:

    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pytest ruff black isort

      - name: Run DevOps Engine
        run: |
          python repo_update_engine.py

      - name: Commit changes
        run: |
          git config user.name "repo-bot"
          git config user.email "bot@github.com"

          git add -A

          if [[ -n $(git status --porcelain) ]]; then
            git commit -m "[skip ci] Automated DevOps Engine Update"
            git push
          else
            echo "No changes to commit"
          fi
