name: Build Portable EXE

# Runs ONLY on push to main.  Secrets (API_FOOTBALL_KEY) are injected here
# and nowhere else.  Feature branches are handled by ci.yml which has no
# secrets and no Windows build step.

on:
  push:
    branches:
      - main

jobs:

  build-windows:

    runs-on: windows-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\pip\Cache
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller pip-audit mypy types-requests

      - name: Security audit (pip-audit)
        run: pip-audit

      - name: Install UPX
        run: |
          choco install upx --no-progress -y

      - name: Verify libraries
        run: |
          python -c "import PySide6"
          python -c "import numpy"
          python -c "import pandas"
          python -c "import sklearn"

      - name: Lint
        run: |
          ruff check .
          black --check .
          isort --check-only .

      - name: Type-check (mypy)
        run: mypy config/ quant/models/ quant/services/ ranking/ database/ notifications/

      - name: Run unit tests
        run: |
          pytest -q --ignore=tests/exe

      - name: Clean previous builds
        shell: pwsh
        run: |
          if (Test-Path build) { Remove-Item -Recurse -Force build }
          if (Test-Path dist)  { Remove-Item -Recurse -Force dist }

      - name: Build EXE
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
        run: |
          python -m PyInstaller football_quant_engine.spec

      - name: Verify build
        run: dir dist\FootballQuantEngine

      - name: Run EXE smoke tests
        env:
          APP_EXE_PATH: dist\FootballQuantEngine\FootballQuantEngine.exe
        run: |
          pytest tests/exe -q -m windows

      - name: Zip Portable App
        shell: pwsh
        run: |
          Compress-Archive -Path dist\FootballQuantEngine\* -DestinationPath FootballQuantEngine-Portable.zip -Force

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FootballQuantEngine-Windows
          path: FootballQuantEngine-Portable.zip
          retention-days: 30
