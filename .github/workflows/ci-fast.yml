name: CI Fast

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  unit-fast:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run fast tests only
        run: |
          pytest -q -k "not exe and not ui and not live and not integration"