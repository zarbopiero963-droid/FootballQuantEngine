name: Build Portable EXE

# Triggers:
#   - push to main         : every merge keeps a verified artifact on record
#   - version tag (v*)     : release build (e.g. v1.2.0)
#   - workflow_dispatch    : manual on-demand build from the GitHub UI
#
# Secrets (API_FOOTBALL_KEY) are injected here and nowhere else.
# Feature-branch CI lives in ci.yml — no secrets, no Windows build.

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

jobs:

  build-windows:

    runs-on: windows-latest
    timeout-minutes: 30

    env:
      API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller pip-audit mypy types-requests

      - name: Security audit (pip-audit)
        run: pip-audit

      - name: Verify libraries
        run: |
          python -c "import PySide6"
          python -c "import numpy"
          python -c "import pandas"
          python -c "import sklearn"
          python -c "import matplotlib"

      - name: Lint
        run: |
          ruff check .
          black --check .

      - name: Type-check (mypy)
        run: mypy config/ quant/models/ quant/services/ ranking/ database/ notifications/

      - name: Run unit tests
        run: pytest -q --ignore=tests/exe

      - name: Install UPX
        run: choco install upx --no-progress -y

      - name: Clean previous builds
        shell: pwsh
        run: |
          if (Test-Path build) { Remove-Item -Recurse -Force build }
          if (Test-Path dist)  { Remove-Item -Recurse -Force dist }

      - name: Build EXE
        run: python -m PyInstaller football_quant_engine.spec

      - name: Verify build
        run: dir dist\FootballQuantEngine

      - name: Run EXE smoke tests
        env:
          APP_EXE_PATH: dist\FootballQuantEngine\FootballQuantEngine.exe
        run: pytest tests/exe -q -m windows

      - name: Zip Portable App
        shell: pwsh
        run: |
          Compress-Archive -Path dist\FootballQuantEngine\* `
            -DestinationPath FootballQuantEngine-Portable.zip -Force

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FootballQuantEngine-Windows
          path: FootballQuantEngine-Portable.zip
          retention-days: 30
