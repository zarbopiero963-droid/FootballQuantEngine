[tool.mypy]
python_version = "3.11"
explicit_package_bases = true
follow_imports = "silent"
ignore_missing_imports = true
warn_return_any = false
warn_unused_ignores = false
check_untyped_defs = false
disable_error_code = ["import-untyped"]

[tool.black]
line-length = 88

[tool.ruff]
line-length = 88
fix = true

[tool.ruff.lint]
extend-select = ["I"]

[tool.ruff.lint.isort]
known-first-party = [
  "quant", "engine", "analytics", "ranking", "database",
  "training", "notifications", "ai", "app", "dashboard",
  "export", "features", "live", "market", "models",
  "normalization", "plugins", "simulation", "strategies",
  "ui", "utils",
]

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["E402"]