name: Repo Update Engine ULTRA

on:
  push:
    paths:
      - devops_update.txt

permissions:
  contents: write

jobs:

  update:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install pytest ruff black isort

      - run: python repo_update_engine.py

      # commit anche backups, logs e patches
      - run: |
          git config user.name "repo-bot"
          git config user.email "bot@github.com"

          git add backups/
          git add logs/
          git add patches/
          git add .

          if [[ -n $(git status --porcelain) ]]; then
            git commit -m "[skip ci] Automated DevOps Engine Update"
            git push
          fi