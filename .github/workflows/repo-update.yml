name: Repo Update Engine ULTRA

on:
  push:
    branches:
      - main
    paths:
      - devops_update.txt
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: repo-update-main
  cancel-in-progress: false

jobs:

  update:

    runs-on: ubuntu-latest

    env:
      PYTHONPATH: ${{ github.workspace }}

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Show commit
        run: |
          echo "TRIGGER COMMIT"
          git log -1

      - name: Show DevOps instructions
        run: |
          echo "DEVOPS UPDATE"
          cat devops_update.txt

      - name: Run DevOps Engine
        run: |
          python repo_update_engine.py

      - name: Show changes
        run: |
          git status
          git diff --stat || true

      - name: Commit changes
        run: |

          git config user.name "repo-bot"
          git config user.email "bot@github.com"

          git add .

          if [[ -z "$(git status --porcelain)" ]]; then
            echo "No changes"
            exit 0
          fi

          git commit -m "[skip ci] Automated DevOps Engine Update"

          git fetch origin main
          git rebase origin/main

          git push --force-with-lease origin HEAD:main