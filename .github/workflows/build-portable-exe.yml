name: Build Portable EXE

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 20

    env:
      API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Upgrade pip
        run: |
          python -m pip install --upgrade pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          python -m pip install pyinstaller

      - name: Verify libraries
        run: |
          python -c "import PySide6"
          python -c "import numpy"
          python -c "import pandas"
          python -c "import sklearn"
          python -c "import matplotlib"

      - name: Run smoke tests
        run: |
          pytest -q -k "not ui and not exe and not live and not integration"

      - name: Build EXE
        run: |
          python -m PyInstaller football_quant_engine.spec

      - name: Zip EXE
        shell: pwsh
        run: |
          Compress-Archive -Path dist\FootballQuantEngine\* -DestinationPath FootballQuantEngine-Portable.zip -Force

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FootballQuantEngine-Windows
          path: FootballQuantEngine-Portable.zip