name: Build Portable EXE

on:
  push:
    branches: ["**"]

jobs:

  build-windows:

    runs-on: windows-latest
    # Restrict secret injection: only main or PRs from the same repo
    if: |
      github.ref == 'refs/heads/main' ||
      (github.event_name == 'pull_request' &&
       github.event.pull_request.head.repo.full_name == github.repository)

    env:
      API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\pip\Cache
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Security audit (pip-audit)
        run: |
          pip install pip-audit
          pip-audit --require-hashes=false

      - name: Install UPX
        run: |
          choco install upx --no-progress -y

      - name: Verify libraries
        run: |
          python -c "import PySide6"
          python -c "import numpy"
          python -c "import pandas"
          python -c "import sklearn"

      - name: Lint
        run: |
          ruff check .
          black --check .
          isort --check-only .

      - name: Type-check (mypy)
        run: |
          pip install mypy
          mypy config/ quant/models/ quant/services/ ranking/ database/ notifications/ --ignore-missing-imports || true

      - name: Run unit tests
        run: |
          pytest -q --ignore=tests/exe

      - name: Clean previous builds
        shell: pwsh
        run: |
          if (Test-Path build) { Remove-Item -Recurse -Force build }
          if (Test-Path dist)  { Remove-Item -Recurse -Force dist }

      - name: Build EXE
        run: |
          python -m PyInstaller football_quant_engine.spec

      - name: Verify build
        run: dir dist\FootballQuantEngine

      - name: Run EXE smoke tests
        env:
          APP_EXE_PATH: dist\FootballQuantEngine\FootballQuantEngine.exe
        run: |
          pytest tests/exe -q -m windows

      - name: Zip Portable App
        shell: pwsh
        run: |
          Compress-Archive -Path dist\FootballQuantEngine\* -DestinationPath FootballQuantEngine-Portable.zip -Force

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FootballQuantEngine-Windows
          path: FootballQuantEngine-Portable.zip
          retention-days: 30
