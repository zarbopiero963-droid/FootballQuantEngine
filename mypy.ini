[mypy]
python_version = 3.10
disallow_incomplete_defs = true
no_implicit_optional = true
warn_no_return = true
warn_redundant_casts = true
ignore_missing_imports = true

# Third-party stubs are incomplete — silence per-module as needed
[mypy-PySide6.*]
ignore_missing_imports = true

[mypy-sklearn.*]
ignore_missing_imports = true

[mypy-scipy.*]
ignore_missing_imports = true

[mypy-optuna.*]
ignore_missing_imports = true

[mypy-joblib.*]
ignore_missing_imports = true

[mypy-matplotlib.*]
ignore_missing_imports = true

[mypy-openpyxl.*]
ignore_missing_imports = true
