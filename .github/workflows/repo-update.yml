name: Repo Update Engine ULTRA

on:
  push:
    paths:
      - devops_update.txt

permissions:
  contents: write

jobs:

  update:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pytest ruff black isort

      - name: Run DevOps Engine
        run: python repo_update_engine.py

      - name: Commit changes
        run: |
          git config user.name "repo-bot"
          git config user.email "bot@github.com"

          git add -A

          git commit -m "Automated DevOps Engine Update" || echo "No changes"

          git push
