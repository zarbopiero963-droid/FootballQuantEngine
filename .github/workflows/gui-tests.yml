name: GUI and Desktop Tests

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Upgrade pip
        shell: pwsh
        run: |
          python -m pip install --upgrade pip

      - name: Install app dependencies
        shell: pwsh
        run: |
          pip install -r requirements.txt

      - name: Install test dependencies
        shell: pwsh
        run: |
          pip install -r requirements-dev.txt

      - name: Install PyInstaller
        shell: pwsh
        run: |
          python -m pip install pyinstaller

      - name: Run logic tests
        shell: pwsh
        run: |
          pytest tests/logic -q

      - name: Run Qt UI tests
        shell: pwsh
        run: |
          pytest tests/ui -q

      - name: Build EXE
        shell: pwsh
        run: |
          python -m PyInstaller football_quant_engine.spec

      - name: Run installed EXE smoke tests
        shell: pwsh
        env:
          APP_EXE_PATH: dist\FootballQuantEngine\FootballQuantEngine.exe
        run: |
          pytest tests/exe -q
