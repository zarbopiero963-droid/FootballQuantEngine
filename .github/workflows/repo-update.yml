name: Repo Update Engine ULTRA

on:
  push:
    paths:
      - devops_update.txt

permissions:
  contents: write

concurrency:
  group: repo-update-main
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest

    env:
      PYTHONPATH: ${{ github.workspace }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pytest black isort ruff

      - name: Run DevOps Engine
        run: |
          python repo_update_engine.py

      - name: Commit + Push (robust)
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "repo-bot"
          git config user.email "bot@github.com"

          git add .

          if [[ -z "$(git status --porcelain)" ]]; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "[skip ci] Automated DevOps Engine Update"

          # Sempre aggiorna info dal remoto
          git fetch origin main

          # Tentativo 1: push normale
          if git push origin HEAD:main; then
            echo "Pushed successfully"
            exit 0
          fi

          echo "Push rejected (fetch first). Syncing and retrying..."

          # Salva l'hash del commit del bot
          LAST_COMMIT="$(git rev-parse HEAD)"

          # Allinea alla versione attuale del remoto
          git reset --hard origin/main

          # Riapplica il commit sopra l'ultima main
          git cherry-pick "$LAST_COMMIT"

          # Tentativo 2: push sicuro (non sovrascrive roba non vista)
          git push --force-with-lease origin HEAD:main
