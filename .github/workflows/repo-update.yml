name: Repo Update Engine ULTRA

on:
  push:
    paths:
      - devops_update.txt

permissions:
  contents: write

concurrency:
  group: repo-update
  cancel-in-progress: true

jobs:

  update:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pytest ruff black isort

      - name: Run DevOps Engine
        run: python repo_update_engine.py

      - name: Configure git
        run: |
          git config user.name "repo-bot"
          git config user.email "bot@github.com"

      - name: Remove forbidden files
        run: |
          git reset

          git add devops_update.txt
          git add repo_update_engine.py

          git add app/ || true
          git add engine/ || true
          git add config/ || true
          git add tests/ || true

      - name: Commit changes if any
        run: |
          if [[ -n $(git status --porcelain) ]]; then
            git commit -m "Automated DevOps Engine Update"
            git push
          else
            echo "No changes to commit"
          fi
