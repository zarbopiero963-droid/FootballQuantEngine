name: Build Portable EXE

on:
  push:
    branches: ["**"]

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m pip install pyinstaller

      - name: Lint
        run: |
          ruff check .
          black --check .
          isort --check-only .

      - name: Run tests
        run: |
          pytest -q

      - name: Build EXE
        run: |
          python -m PyInstaller football_quant_engine.spec

      - name: Zip EXE
        shell: pwsh
        run: |
          Compress-Archive -Path dist\FootballQuantEngine\* -DestinationPath FootballQuantEngine-Portable.zip -Force

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FootballQuantEngine-Windows
          path: FootballQuantEngine-Portable.zip