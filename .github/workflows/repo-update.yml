name: Repo Update Engine ULTRA

on:
  push:
    branches:
      - main
    paths:
      - devops_update.txt
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    env:
      PYTHONPATH: ${{ github.workspace }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pytest black isort ruff

      - name: Run DevOps Engine
        run: |
          python repo_update_engine.py

      - name: Commit changes
        run: |
          git config user.name "repo-bot"
          git config user.email "bot@github.com"

          git add .

          if [[ -n "$(git status --porcelain)" ]]; then
            git commit -m "[skip ci] Automated DevOps Engine Update"
            git push
          else
            echo "No changes"
          fi
