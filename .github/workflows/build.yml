name: Build Portable EXE

on:
  push:
    branches: ["**"]

jobs:

  build-windows:

    runs-on: windows-latest

    env:
      API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Upgrade pip
        run: |
          python -m pip install --upgrade pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          python -m pip install pyinstaller

      - name: Verify libraries
        run: |
          python -c "import PySide6"
          python -c "import numpy"
          python -c "import pandas"
          python -c "import sklearn"
          python -c "import matplotlib"

      - name: Lint
        run: |
          ruff check .
          black --check .
          isort --check-only .

      - name: Run tests
        run: |
          pytest -q

      - name: Build EXE
        run: |
          python -m PyInstaller football_quant_engine.spec

      - name: Zip EXE
        shell: pwsh
        run: |
          Compress-Archive -Path dist\FootballQuantEngine\* -DestinationPath FootballQuantEngine-Portable.zip -Force

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FootballQuantEngine-Windows
          path: FootballQuantEngine-Portable.zip