name: GUI and Desktop Tests

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  test-windows:
    runs-on: windows-latest
    timeout-minutes: 15

    env:
      API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Upgrade pip
        run: |
          python -m pip install --upgrade pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run logic tests
        run: |
          pytest tests/logic -q

      - name: Run Qt UI tests
        run: |
          pytest tests/ui -q

      - name: Build EXE
        run: |
          python -m PyInstaller football_quant_engine.spec

      - name: Run EXE smoke tests
        env:
          APP_EXE_PATH: dist\FootballQuantEngine\FootballQuantEngine.exe
        run: |
          pytest tests/exe -q