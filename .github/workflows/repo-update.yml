name: Repo Update Engine ULTRA

on:
  push:
    paths:
      - devops_update.txt

permissions:
  contents: write

concurrency:
  group: repo-update-main
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest

    env:
      PYTHONPATH: ${{ github.workspace }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pytest black isort ruff

      - name: Run DevOps Engine
        run: |
          python repo_update_engine.py

      - name: Commit changes
        shell: bash
        run: |
          set -e

          git config user.name "repo-bot"
          git config user.email "bot@github.com"

          git add .

          if [[ -z "$(git status --porcelain)" ]]; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "[skip ci] Automated DevOps Engine Update"

          # FIX: sync robusto con remoto
          git fetch origin main
          git rebase origin/main

          # FIX: push sicuro in caso di concorrenza
          git push --force-with-lease origin HEAD:main
