name: Repo Update Engine ULTRA

on:
  push:
    branches:
      - main
    paths:
      - devops_update.txt
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: repo-update-main
  cancel-in-progress: false

jobs:

  update:

    runs-on: ubuntu-latest

    env:
      PYTHONPATH: ${{ github.workspace }}

    steps:

      # -------------------------
      # CHECKOUT
      # -------------------------

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # -------------------------
      # PYTHON
      # -------------------------

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # -------------------------
      # INSTALL DEPENDENCIES
      # -------------------------

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      # -------------------------
      # SHOW TRIGGER COMMIT
      # -------------------------

      - name: Show trigger commit
        run: |
          echo "=============================="
          echo "TRIGGER COMMIT"
          echo "=============================="
          git log -1

      # -------------------------
      # SHOW DEVOPS COMMANDS
      # -------------------------

      - name: Show DevOps instructions
        run: |
          echo "=============================="
          echo "DEVOPS UPDATE COMMANDS"
          echo "=============================="
          cat devops_update.txt
          echo "=============================="

      # -------------------------
      # RUN DEVOPS ENGINE
      # -------------------------

      - name: Run DevOps Engine
        run: |
          python repo_update_engine.py

      # -------------------------
      # SHOW FILE CHANGES
      # -------------------------

      - name: Show changed files
        run: |
          echo "=============================="
          echo "FILES CHANGED"
          echo "=============================="
          git status
          echo "------------------------------"
          git diff --stat || true
          echo "=============================="

      # -------------------------
      # COMMIT CHANGES
      # -------------------------

      - name: Commit changes
        shell: bash
        run: |

          git config user.name "repo-bot"
          git config user.email "bot@github.com"

          git add .

          if [[ -z "$(git status --porcelain)" ]]; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "[skip ci] Automated DevOps Engine Update"

          # sincronizza con remoto
          git pull --rebase origin main

          git push